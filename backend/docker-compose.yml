version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: inventario_dev
      MYSQL_DATABASE: explotacion_exploracion_dev # O el nombre que uses
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_net

  flask_app:
    build: .
    container_name: flask_server
    volumes:
      - .:/app  # Esto es un "bind mount": cambios que hagas en VS Code se ven en el contenedor
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app_net
  
  nginx_proxy:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - flask_app
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  db_data: